# ============================================================================
# Spring Boot Configuration — genomics-api
# ============================================================================

# --- Aplicație ---
spring.application.name=genomics-api
server.port=8080

# --- Upload fișiere mari (BAM-uri pot fi 2-7 GB) ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10GB
spring.servlet.multipart.max-request-size=10GB
spring.servlet.multipart.file-size-threshold=2KB

server.tomcat.max-swallow-size=10GB
server.tomcat.max-http-form-post-size=10GB

# --- JWT Configuration ---
app.jwt.secret=MySecretKeyForLicentaProjectMinimum256BitsLong2026ChangeMeNow
app.jwt.expiration-ms=86400000

# --- Python AI Service ---
app.python-api.url=http://localhost:8000
app.python-api.timeout-seconds=3600
app.python-api.key=Bvj5w4j3pmYKPolC8f_hOYI_sIlZSUg6k_pENI7zEn0

# --- Director temporar pentru BAM-uri uploadate ---
app.upload.directory=./uploads
app.upload.encrypted-directory=./uploads-encrypted

# --- AES Encryption ---
app.encryption.secret=MyAesEncryptionKey32BytesLongForAES256Encryption!!

# --- VEP (Variant Effect Predictor) ---
app.vep.data-dir=C:/vep_data
app.vep.docker-image=ensemblorg/ensembl-vep
app.vep.timeout-minutes=30

# ============================================================================
# H2 Database (file-based — persistă între restart-uri)
# ============================================================================
spring.datasource.url=jdbc:h2:file:./data/genomicsdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (vizualizare DB la http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ============================================================================
# Logging
# ============================================================================
logging.level.ro.licenta.genomicsapi=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n