# ============================================================================
# Spring Boot Configuration — genomics-api
# ============================================================================

# --- Aplicație ---
spring.application.name=genomics-api
server.port=8443

# --- HTTPS / TLS (DEZACTIVAT temporar pentru testare) ---
# După ce generăm certificatul, decomentează aceste linii:
# server.ssl.enabled=true
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=changeit
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=genomicsapi

# Temporar — HTTP simplu pe portul 8080
server.ssl.enabled=false
server.port=8080

# --- Upload fișiere mari (BAM-uri pot fi 2-5 GB) ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10GB
spring.servlet.multipart.max-request-size=10GB
spring.servlet.multipart.file-size-threshold=2KB

# Tomcat trebuie să accepte request-uri mari
server.tomcat.max-swallow-size=10GB
server.tomcat.max-http-form-post-size=10GB

# --- JWT Configuration ---
# Secret key (32+ caractere). În producție vine din env var.
app.jwt.secret=MySecretKeyForLicentaProjectMinimum256BitsLong2026ChangeMe
app.jwt.expiration-ms=86400000

# --- Python AI Service ---
app.python-api.url=http://localhost:8000
app.python-api.timeout-seconds=3600
# API key — citită din .api_key generat de Python
app.python-api.key=yJw-N99LfIjkC1WDo8O3gjfCY-FuL5Rfl2SsRObQzCY

# --- Director temporar pentru BAM-uri uploadate ---
app.upload.directory=./uploads
app.upload.encrypted-directory=./uploads-encrypted

# --- AES Encryption ---
# Secret pentru criptarea fișierelor (32 bytes pentru AES-256)
app.encryption.secret=MyAesEncryptionKey32BytesLongForAES256Encryption!!

# --- VEP (Variant Effect Predictor) ---
# Directorul unde sunt cache-ul VEP, FASTA și plugin-ul ClinVar
app.vep.data-dir=C:/vep_data
app.vep.docker-image=ensemblorg/ensembl-vep
app.vep.timeout-minutes=30

# --- Logging ---
logging.level.ro.licenta.genomicsapi=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n